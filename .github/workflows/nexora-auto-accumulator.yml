name: NEXORA Auto Accumulator

on:
  workflow_dispatch:
  schedule:
    # GitHub cron uses UTC. These are selected KST/US-market checkpoints.
    # KST 09:10 / 12:30 / 15:40 / 23:30 / 02:00 / 05:30 on weekdays.
    - cron: "10 0 * * 1-5"
    - cron: "30 3 * * 1-5"
    - cron: "40 6 * * 1-5"
    - cron: "30 14 * * 1-5"
    - cron: "0 17 * * 1-5"
    - cron: "30 20 * * 1-5"

permissions:
  contents: write

concurrency:
  group: nexora-auto-accumulator
  cancel-in-progress: false

jobs:
  accumulate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run cloud accumulator
        env:
          AUTO_ACCUMULATOR_ONCE: "1"
          AUTO_INTRADAY_REFRESH_ENABLED: "1"
          AUTO_ACCUMULATOR_INTERVAL_MIN: "15"
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
          GNEWS_API_KEY: ${{ secrets.GNEWS_API_KEY }}
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
          SERPAPI_API_KEY: ${{ secrets.SERPAPI_API_KEY }}
          DART_API_KEY: ${{ secrets.DART_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          LLM_PROVIDER: ${{ secrets.LLM_PROVIDER }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          SEC_USER_AGENT: ${{ secrets.SEC_USER_AGENT }}
          KIS_APP_KEY: ${{ secrets.KIS_APP_KEY }}
          KIS_APP_SECRET: ${{ secrets.KIS_APP_SECRET }}
          KIS_ACCOUNT_NO: ${{ secrets.KIS_ACCOUNT_NO }}
        run: python run_cloud_accumulator.py

      - name: Commit updated reports
        run: |
          git config user.name "nexora-bot"
          git config user.email "nexora-bot@example.com"
          git add reports data logs backups || true
          git commit -m "auto: update NEXORA reports" || echo "No changes"
          git push || true
