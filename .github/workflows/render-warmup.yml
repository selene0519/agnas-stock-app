name: Render Warmup Ping

on:
  schedule:
    # 한국장 시간대 UTC 00:00~06:30 (KST 09:00~15:30) 매 28분 핑
    - cron: "0,28,56 0-6 * * 1-5"
    # 미장 시간대 UTC 14:30~21:00 (KST 23:30~06:00) 매 28분 핑
    - cron: "0,28,56 14-21 * * 1-5"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Ping Render backend (no git, no python)
        env:
          MONE_BACKEND_URL: https://agnas-stock-app.onrender.com
        run: |
          echo "Ping $MONE_BACKEND_URL"
          STATUS=$(curl -sf -o /dev/null -w "%{http_code}" --max-time 25 "$MONE_BACKEND_URL/health" || echo "000")
          echo "HTTP $STATUS"
          if [ "$STATUS" = "200" ]; then echo "OK"; else echo "warm-up needed"; fi
