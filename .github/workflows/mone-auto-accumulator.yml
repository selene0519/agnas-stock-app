      - name: VTJ 주간 과거 리플레이 백필 (walk-forward)
        if: github.event_name == 'schedule'
        working-directory: mone-web-app/backend
        env:
          PYTHONPATH: .
        run: |
          set +e
          python - <<'PY'
          import sys, json
          from datetime import date, timedelta
          from pathlib import Path
          sys.path.insert(0, str(Path.cwd()))
          from app.services import virtual_trade_journal as vtj

          # Weekly drip: old enough to have evaluation windows, small enough to avoid overfitting bursts.
          end = date.today() - timedelta(days=120)
          start = end - timedelta(days=420)
          jobs = [
              ("kr", "balanced", "swing"),
              ("kr", "conservative", "swing"),
              ("us", "balanced", "swing"),
          ]
          results = []
          for market, mode, horizon in jobs:
              result = vtj.historical_replay_backfill(
                  market=market,
                  mode=mode,
                  horizon=horizon,
                  start_date=start.isoformat(),
                  end_date=end.isoformat(),
                  step_days=35,
                  limit=5,
                  max_runs=8,
                  evaluate_after=True,
              )
              results.append(result)
          print(json.dumps({"status": "OK", "results": results}, ensure_ascii=False, indent=2))
          PY
          echo "vtj-backfill: exit $?"
          set -e

