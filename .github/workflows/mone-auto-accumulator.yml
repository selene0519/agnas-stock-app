name: MONE Auto Accumulator

on:
  workflow_dispatch:
  schedule:
    # UTC 기준. KST 07:30 (장전) / 16:30 (국장 마감 후) / 토 06:00 (미장 금요일 마감 후)
    - cron: "30 22 * * 0-4"   # KST 07:30 (장전 데이터 수집, 월~금)
    - cron: "30 7 * * 1-5"    # KST 16:30 (국장 마감 후 수집, 월~금)
    - cron: "0 21 * * 5"      # KST 토 06:00 (미장 금요일 마감 후 수집)

permissions:
  contents: write

defaults:
  run:
    shell: bash

concurrency:
  group: mone-auto-accumulator-${{ github.ref }}
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      CI: "true"
      GITHUB_ACTIONS_RUN: "true"
      TZ: Asia/Seoul
      PYTHONUTF8: "1"
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
      STREAMLIT_APP_ENABLE_LIVE_API: "1"
      MONE_ENABLE_LIVE_QUOTES: "1"
      DART_API_KEY: ${{ secrets.DART_API_KEY }}
      FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
      GNEWS_API_KEY: ${{ secrets.GNEWS_API_KEY }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      ALPHA_VANTAGE_KEY: ${{ secrets.ALPHA_VANTAGE_KEY }}
      SEC_USER_AGENT: ${{ secrets.SEC_USER_AGENT }}
      KIS_APP_KEY: ${{ secrets.KIS_APP_KEY }}
      KIS_APPKEY: ${{ secrets.KIS_APPKEY }}
      KIS_APP_SECRET: ${{ secrets.KIS_APP_SECRET }}
      KIS_APP_SECRET_KEY: ${{ secrets.KIS_APP_SECRET_KEY }}
      KIS_SECRET: ${{ secrets.KIS_SECRET }}
      KIS_ACCOUNT: ${{ secrets.KIS_ACCOUNT }}
      KIS_ACCOUNT_NO: ${{ secrets.KIS_ACCOUNT_NO }}
      KIS_CANO: ${{ secrets.KIS_CANO }}
      KIS_ACNT_PRDT_CD: ${{ secrets.KIS_ACNT_PRDT_CD }}
      KIS_IS_MOCK: ${{ secrets.KIS_IS_MOCK }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true
          token: ${{ secrets.GH_PAT }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            python -m pip install -r requirements.txt
          else
            python -m pip install pandas numpy requests python-dotenv yfinance finance-datareader beautifulsoup4 lxml
          fi

      - name: Run MONE cloud update
        run: |
          if [ -f scripts/mone_github_auto_update.py ]; then
            python scripts/mone_github_auto_update.py
          else
            echo "scripts/mone_github_auto_update.py not found; skip cloud update."
          fi

      - name: Refresh live KIS quotes
        working-directory: mone-web-app/backend
        env:
          PYTHONPATH: .
        run: |
          if [ "${STREAMLIT_APP_ENABLE_LIVE_API:-0}" != "1" ]; then
            echo "STREAMLIT_APP_ENABLE_LIVE_API is not 1; skip live quote refresh."
            exit 0
          fi

          python - <<'PY'
          from __future__ import annotations

          from pathlib import Path
          import csv
          import json
          import os
          import re
          from datetime import datetime

          from app.services import quotes

          repo_root = Path.cwd().parents[1]
          reports = repo_root / "reports"
          stockapp = repo_root / "data" / "stockapp"
          reports.mkdir(parents=True, exist_ok=True)
          stockapp.mkdir(parents=True, exist_ok=True)

          def adopt_env(primary: str, *aliases: str) -> None:
              if os.environ.get(primary):
                  return
              for alias in aliases:
                  value = os.environ.get(alias)
                  if value:
                      os.environ[primary] = value
                      return

          adopt_env("KIS_APP_KEY", "KIS_APPKEY")
          adopt_env("KIS_APP_SECRET", "KIS_APP_SECRET_KEY", "KIS_SECRET")
          adopt_env("KIS_ACCOUNT", "KIS_ACCOUNT_NO")

          account = re.sub(r"\D", "", os.environ.get("KIS_ACCOUNT", ""))
          if account and not os.environ.get("KIS_CANO") and len(account) >= 8:
              os.environ["KIS_CANO"] = account[:8]
          if account and not os.environ.get("KIS_ACNT_PRDT_CD") and len(account) >= 10:
              os.environ["KIS_ACNT_PRDT_CD"] = account[8:10]

          env_status = {
              "KIS_APP_KEY": bool(os.environ.get("KIS_APP_KEY")),
              "KIS_APP_SECRET": bool(os.environ.get("KIS_APP_SECRET")),
              "KIS_ACCOUNT": bool(os.environ.get("KIS_ACCOUNT")),
              "KIS_CANO": bool(os.environ.get("KIS_CANO")),
              "KIS_ACNT_PRDT_CD": bool(os.environ.get("KIS_ACNT_PRDT_CD")),
              "KIS_IS_MOCK": os.environ.get("KIS_IS_MOCK", ""),
          }
          print({"kis_env_present": env_status})

          fieldnames = [
              "symbol", "market", "ok", "currentPrice", "current_price", "last_price",
              "priceTime", "priceSource", "source", "priceSourceType", "priceSourceFile",
              "priceSourceDate", "kis_quote_success", "quote_available", "error", "updated_at",
              "prevClose", "changePct",
          ]

          def empty_csv(target: Path) -> None:
              target.parent.mkdir(parents=True, exist_ok=True)
              with target.open("w", newline="", encoding="utf-8-sig") as fh:
                  writer = csv.DictWriter(fh, fieldnames=fieldnames)
                  writer.writeheader()

          def source_type(item: dict) -> str:
              source_text = " ".join(str(item.get(k, "")) for k in ("priceSource", "source", "fallbackFrom"))
              source_lower = source_text.lower()
              ok = bool(item.get("ok"))
              if ok and "kis" in source_lower and "fallback" not in source_lower:
                  return "kis_snapshot"
              if ok and "finnhub" in source_lower:
                  return "finnhub_fallback"
              if ok and "yfinance" in source_lower:
                  return "yfinance_fallback"
              if ok:
                  return "quote_fallback"
              return "quote_failed"

          def build_rows(market: str, result: dict, only_kis: bool) -> list[dict]:
              rows = []
              for item in result.get("items", []) or []:
                  stype = source_type(item)
                  if only_kis and stype != "kis_snapshot":
                      continue
                  price = item.get("currentPrice")
                  ok = bool(item.get("ok")) and price not in (None, "")
                  price_source = item.get("priceSource") or item.get("source") or "KIS current price"
                  price_time = item.get("priceTime") or result.get("updatedAt", "")
                  prev_close = item.get("prevClose")
                  change_pct = item.get("changePct")
                  rows.append({
                      "symbol": item.get("symbol", ""),
                      "market": market,
                      "ok": str(ok).lower(),
                      "currentPrice": price if ok else "",
                      "current_price": price if ok else "",
                      "last_price": price if ok else "",
                      "priceTime": price_time,
                      "priceSource": price_source,
                      "source": price_source,
                      "priceSourceType": stype,
                      "priceSourceFile": f"reports/kis_current_price_{market}.csv" if stype == "kis_snapshot" else f"reports/intraday_realtime_snapshot_{market}.csv",
                      "priceSourceDate": price_time,
                      "kis_quote_success": "true" if stype == "kis_snapshot" else "false",
                      "quote_available": "true" if ok else "false",
                      "error": item.get("error", ""),
                      "updated_at": result.get("updatedAt", ""),
                      "prevClose": prev_close if prev_close is not None else "",
                      "changePct": change_pct if change_pct is not None else "",
                  })
              return rows

          def write_rows(targets: list[Path], rows: list[dict]) -> None:
              for target in targets:
                  target.parent.mkdir(parents=True, exist_ok=True)
                  with target.open("w", newline="", encoding="utf-8-sig") as fh:
                      writer = csv.DictWriter(fh, fieldnames=fieldnames)
                      writer.writeheader()
                      writer.writerows(rows)

          has_kis_config = env_status["KIS_APP_KEY"] and env_status["KIS_APP_SECRET"]
          status_summary = {
              "updatedAt": datetime.now().strftime("%Y-%m-%d %H:%M:%S KST"),
              "envPresent": env_status,
              "markets": {},
          }

          for market in ("kr", "us"):
              kis_targets = [
                  reports / f"kis_current_price_{market}.csv",
                  stockapp / f"kis_current_price_{market}.csv",
              ]
              all_targets = [
                  reports / f"intraday_realtime_snapshot_{market}.csv",
                  reports / f"intraday_quote_snapshot_{market}.csv",
                  stockapp / f"intraday_realtime_snapshot_{market}.csv",
                  stockapp / f"intraday_quote_snapshot_{market}.csv",
              ]

              if not has_kis_config:
                  for target in kis_targets + all_targets:
                      empty_csv(target)
                  status_summary["markets"][market] = {
                      "status": "MISSING_KIS_SECRET",
                      "refreshed": 0,
                      "failed": 0,
                      "kisRows": 0,
                      "fallbackRows": 0,
                      "message": "KIS_APP_KEY/KIS_APP_SECRET are not available in GitHub Actions secrets.",
                  }
                  print({"market": market, "status": "MISSING_KIS_SECRET", "refreshed": 0, "failed": 0})
                  continue

              result = quotes.refresh_quotes(market=market, max_symbols=150)
              kis_rows = build_rows(market, result, only_kis=True)
              all_rows = build_rows(market, result, only_kis=False)
              write_rows(kis_targets, kis_rows)
              write_rows(all_targets, all_rows)

              status_summary["markets"][market] = {
                  "status": result.get("status"),
                  "refreshed": result.get("refreshed"),
                  "failed": result.get("failed"),
                  "kisRows": len(kis_rows),
                  "fallbackRows": max(0, len(all_rows) - len(kis_rows)),
                  "updatedAt": result.get("updatedAt"),
              }
              print({
                  "market": market,
                  "status": result.get("status"),
                  "refreshed": result.get("refreshed"),
                  "failed": result.get("failed"),
                  "kisRows": len(kis_rows),
                  "fallbackRows": max(0, len(all_rows) - len(kis_rows)),
                  "updatedAt": result.get("updatedAt"),
              })

          (reports / "kis_live_refresh_status.json").write_text(
              json.dumps(status_summary, ensure_ascii=False, indent=2),
              encoding="utf-8",
          )
          PY

      - name: Record virtual operation history
        working-directory: mone-web-app/backend
        env:
          PYTHONPATH: .
        run: |
          if [ -f record_operation_history.py ]; then
            python record_operation_history.py --market all --modes all --source github-actions --backfill-existing
          else
            echo "record_operation_history.py not found; skip history record."
          fi

      - name: Generate MONE v3.6.1 operational reports
        working-directory: mone-web-app/backend
        env:
          PYTHONPATH: .
        run: |
          set +e
          export PYTHONPATH="$PWD:${PYTHONPATH:-}"
          python operational_check.py
          status=$?
          set -e
          if [ "$status" -ne 0 ]; then
            echo "warning: operational_check.py returned $status; keep workflow running so generated data can still be committed."
          fi


      - name: Refresh GNews news (매일 장전/장후)
        working-directory: mone-web-app/backend
        env:
          PYTHONPATH: .
          GNEWS_API_KEY: ${{ secrets.GNEWS_API_KEY }}
        run: |
          set +e
          python - <<'PY'
          import os, json, sys
          from pathlib import Path
          sys.path.insert(0, str(Path.cwd()))
          from app.services import data_loader as data
          key = os.environ.get("GNEWS_API_KEY", "")
          if not key:
              print("GNEWS_API_KEY 없음 — 뉴스 수집 건너뜀")
              exit(0)
          result = data.collect_gnews("all")
          print(json.dumps(result, ensure_ascii=False, indent=2))
          for r in result.get("results", []):
              print(f"  [{r['market']}] {r.get('status')} {r.get('count',0)}건 → {r.get('file','')}")
          PY
          echo "gnews refresh: exit $?"
          set -e

      - name: Refresh DART disclosures (매일)
        working-directory: mone-web-app/backend
        env:
          PYTHONPATH: .
          DART_API_KEY: ${{ secrets.DART_API_KEY }}
        run: |
          set +e
          python - <<'PY'
          import os, json, sys
          from pathlib import Path
          sys.path.insert(0, str(Path.cwd()))
          from app.services import data_loader as data
          key = os.environ.get("DART_API_KEY", "")
          if not key:
              print("DART_API_KEY 없음 — 공시 수집 건너뜀")
              exit(0)
          result = data.refresh_disclosures(market="all", days=7)
          print(json.dumps(result, ensure_ascii=False, indent=2))
          for r in result.get("results", []):
              print(f"  [{r.get('market','?')}] {r.get('count',0)}건 → {r.get('file','')}")
          PY
          echo "dart refresh: exit $?"
          set -e

      - name: News sentiment cache 갱신 (공시+뉴스 → 종목별 감성 점수)
        working-directory: mone-web-app/backend
        env:
          PYTHONPATH: .
        run: |
          set +e
          python - <<'PY'
          import sys, json
          from pathlib import Path
          sys.path.insert(0, str(Path.cwd()))
          from app.engine.news_sentiment_engine import build_sentiment_cache
          for mk in ("kr", "us"):
              result = build_sentiment_cache(mk)
              cnt = result.get("count", 0)
              print(f"[sentiment-cache/{mk}] {cnt}개 종목 감성 캐시 갱신")
          PY
          echo "sentiment-cache: exit $?"
          set -e

      - name: Ping backend API (배포 서버가 있으면 캐시 갱신)
        env:
          MONE_BACKEND_URL: ${{ secrets.MONE_BACKEND_URL || 'https://agnas-stock-app.onrender.com' }}
          ENABLE_BACKEND_NEWS_REFRESH: ${{ vars.ENABLE_BACKEND_NEWS_REFRESH || '0' }}
        run: |
          if [ -z "${MONE_BACKEND_URL}" ]; then
            echo "MONE_BACKEND_URL 미설정 — 백엔드 ping 건너뜀"
            exit 0
          fi
          BASE="${MONE_BACKEND_URL%/}"
          echo "백엔드 ping: ${BASE}"
          set +e
          if [ "${ENABLE_BACKEND_NEWS_REFRESH}" = "1" ]; then
            curl -sf -X POST "${BASE}/api/news/refresh?market=all" \
              -H "Content-Type: application/json" --max-time 30 \
              -o /tmp/news_refresh.json && cat /tmp/news_refresh.json || true
          else
            echo "backend news refresh skipped to conserve GNews quota"
          fi
          curl -sf -X POST "${BASE}/api/disclosures/refresh?market=all" \
            -H "Content-Type: application/json" --max-time 60 \
            -o /tmp/disc_refresh.json && cat /tmp/disc_refresh.json || true
          curl -sf -X POST "${BASE}/api/quotes/refresh-targets" \
            -H "Content-Type: application/json" --max-time 30 || true
          set -e
          echo "백엔드 ping 완료"

      - name: Fetch DART financials (weekly on Monday)
        run: |
          set +e
          DAY=$(date +%u)
          if [ "$DAY" = "1" ] && [ -f scripts/fetch_dart_financials.py ]; then
            python scripts/fetch_dart_financials.py
            echo "fetch_dart_financials: exit $?"
          else
            echo "Not Monday or script missing — skip DART fetch."
          fi
          set -e

      - name: Fetch KR financial data via yfinance (weekly on Monday)
        run: |
          set +e
          DAY=$(date +%u)
          if [ "$DAY" = "1" ] && [ -f scripts/fetch_kr_financial_data.py ]; then
            python scripts/fetch_kr_financial_data.py
            echo "fetch_kr_financial_data: exit $?"
          else
            echo "Not Monday or script missing — skip KR financial fetch."
          fi
          set -e

      - name: Fetch sector data (weekly on Monday)
        run: |
          set +e
          DAY=$(date +%u)
          if [ "$DAY" = "1" ] && [ -f scripts/fetch_sector_data.py ]; then
            python scripts/fetch_sector_data.py
            echo "fetch_sector_data: exit $?"
          else
            echo "Not Monday or script missing — skip sector fetch."
          fi
          set -e

      - name: Backfill OHLCV history for DATA_PENDING stocks
        run: |
          set +e
          if [ -f scripts/backfill_ohlcv_history.py ]; then
            python scripts/backfill_ohlcv_history.py --min-rows 30 --days 120
            echo "backfill_ohlcv_history: exit $?"
          else
            echo "scripts/backfill_ohlcv_history.py not found; skip backfill."
          fi
          set -e

      - name: Refresh KR institutional/foreign supply flow (KIS)
        run: |
          set +e
          if [ -f scripts/refresh_kr_supply_flow.py ]; then
            python scripts/refresh_kr_supply_flow.py
            echo "refresh_kr_supply_flow: exit $?"
          else
            echo "scripts/refresh_kr_supply_flow.py not found; skip."
          fi
          set -e

      - name: Refresh KR administrative-issue/SPAC/caution listing status
        run: |
          set +e
          if [ -f scripts/refresh_kr_listing_status.py ]; then
            python scripts/refresh_kr_listing_status.py
            echo "refresh_kr_listing_status: exit $?"
          else
            echo "scripts/refresh_kr_listing_status.py not found; skip."
          fi
          set -e

      - name: Generate KR recommendations from OHLCV
        run: |
          set +e
          if [ -f scripts/refresh_kr_close_ohlcv.py ]; then
            python scripts/refresh_kr_close_ohlcv.py
            echo "refresh_kr_close_ohlcv: exit $?"
          else
            echo "scripts/refresh_kr_close_ohlcv.py not found; skip KR OHLCV refresh."
          fi
          python scripts/generate_kr_recommendations.py
          echo "generate_kr_recommendations: exit $?"
          set -e

      - name: Send KR summary to Telegram
        run: |
          set +e
          python scripts/notify_daily_summary.py --market kr
          echo "notify KR: exit $?"
          set -e

      - name: Refresh US close OHLCV (장마감 후 / 금요일 마감)
        run: |
          set +e
          if [ -f scripts/refresh_us_close_ohlcv.py ]; then
            python scripts/refresh_us_close_ohlcv.py
            echo "refresh_us_close_ohlcv: exit $?"
          else
            echo "scripts/refresh_us_close_ohlcv.py not found; skip US OHLCV refresh."
          fi
          set -e

      - name: Generate US recommendations from OHLCV
        run: |
          set +e
          if [ -f scripts/generate_us_recommendations.py ]; then
            python scripts/generate_us_recommendations.py
            echo "generate_us_recommendations: exit $?"
          else
            echo "scripts/generate_us_recommendations.py not found; skip."
          fi
          set -e

      - name: Send US summary to Telegram
        run: |
          set +e
          python scripts/notify_daily_summary.py --market us
          echo "notify US: exit $?"
          set -e

      - name: Refresh KR/US close validations
        # 파일명은 kr만 가리키지만 KR+US 둘 다 생성함 (US 누락이 settle_pending_validations.py가
        # US 예측을 영영 EXPIRED로만 종결시키던 원인이었음 — _build_validation_index가 찾는
        # 날짜 스냅샷 trade_validation_us_*.csv가 한 번도 생성된 적이 없었음).
        run: |
          set +e
          if [ -f scripts/generate_kr_close_validation.py ]; then
            python scripts/generate_kr_close_validation.py
            echo "generate_kr_close_validation: exit $?"
          else
            echo "scripts/generate_kr_close_validation.py not found; skip."
          fi
          set -e

      - name: Fetch benchmark index data (weekly on Monday)
        run: |
          set +e
          DAY=$(date +%u)
          if [ "$DAY" = "1" ] && [ -f scripts/fetch_benchmark_data.py ]; then
            python scripts/fetch_benchmark_data.py
            echo "fetch_benchmark_data: exit $?"
          else
            echo "Not Monday — skip benchmark fetch."
          fi
          set -e

      - name: Run history analysis
        # 검증 정산(settle_pending_validations.py)·승률 갱신(update_win_rates.py)은
        # mone-settle-validations.yml로 분리됨 — cancel-in-progress 동시성 취소에 자주
        # 걸려 정산이 3주 넘게 멈췄던 적이 있어, 무거운 이 워크플로에서 떼어냄.
        run: |
          set +e
          if [ -f scripts/analyze_history.py ]; then
            python scripts/analyze_history.py
            echo "analyze_history: exit $?"
          fi
          set -e

      - name: Update pattern performance + support/resistance zones
        run: |
          set +e
          if [ -f scripts/pattern_performance_tracker.py ]; then
            python scripts/pattern_performance_tracker.py --all
            echo "pattern_performance_tracker: exit $?"
          fi
          set -e

      - name: Verify signal ledger outcomes (호라이즌별 자동 결과 검증)
        working-directory: mone-web-app/backend
        env:
          PYTHONPATH: .
        run: |
          set +e
          python - <<'PY'
          import sys
          from pathlib import Path
          sys.path.insert(0, str(Path.cwd()))
          from app.services import signal_ledger as sl
          result = sl.verify()
          print(f"[signal_ledger] verified={result.get('verified', 0)}, skipped={result.get('skipped', 0)}")
          PY
          echo "signal_ledger verify: exit $?"
          set -e

      - name: Auto-rebuild self-correction params (샘플 30건+ 시 자동 실행)
        working-directory: mone-web-app/backend
        env:
          PYTHONPATH: .
        run: |
          set +e
          python - <<'PY'
          import sys, json
          from pathlib import Path
          sys.path.insert(0, str(Path.cwd()))

          # 검증 결과 샘플 수 확인
          from app.engine import self_correction_v2 as _scv2, correction_store
          _MIN_AUTO = 30
          all_rows = _scv2._load_validation_results("kr")
          sample_count = len(all_rows)
          print(f"[auto-correction] validation rows={sample_count}, threshold={_MIN_AUTO}")

          if sample_count < _MIN_AUTO:
              print(f"[auto-correction] 샘플 부족 ({sample_count} < {_MIN_AUTO}) — 스킵")
          else:
              old_v = correction_store.load_params().get("version", 0)
              result_kr = _scv2.build_correction_params("kr")
              new_v = result_kr.get("version", 0)
              print(f"[auto-correction] KR 보정 파라미터 재계산 완료: v{old_v} → v{new_v}, "
                    f"샘플={result_kr.get('totalSamples', 0)}")
              # US 샘플도 있으면 재계산
              us_rows = _scv2._load_validation_results("us")
              if len(us_rows) >= _MIN_AUTO:
                  result_us = _scv2.build_correction_params("us")
                  print(f"[auto-correction] US 보정 파라미터 재계산 완료: 샘플={result_us.get('totalSamples', 0)}")
          PY
          echo "auto-correction: exit $?"
          set -e

      - name: VTJ 자동 캡처 (가상 체결 기록, git 저장용)
