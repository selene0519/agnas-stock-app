name: MONE Auto Accumulator

on:
  workflow_dispatch:
 
permissions:
  contents: write

defaults:
  run:
    shell: bash

concurrency:
  group: mone-auto-accumulator-${{ github.ref }}
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      CI: "true"
      GITHUB_ACTIONS_RUN: "true"
      TZ: Asia/Seoul
      PYTHONUTF8: "1"
      STREAMLIT_APP_ENABLE_LIVE_API: "0"
      DART_API_KEY: ${{ secrets.DART_API_KEY }}
      FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
      GNEWS_API_KEY: ${{ secrets.GNEWS_API_KEY }}
      SEC_USER_AGENT: ${{ secrets.SEC_USER_AGENT }}
      KIS_APP_KEY: ${{ secrets.KIS_APP_KEY }}
      KIS_APP_SECRET: ${{ secrets.KIS_APP_SECRET }}
      KIS_ACCOUNT: ${{ secrets.KIS_ACCOUNT }}
      KIS_CANO: ${{ secrets.KIS_CANO }}
      KIS_ACNT_PRDT_CD: ${{ secrets.KIS_ACNT_PRDT_CD }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            python -m pip install -r requirements.txt
          else
            python -m pip install pandas numpy requests python-dotenv yfinance finance-datareader beautifulsoup4 lxml
          fi

      - name: Run MONE cloud update
        run: |
          if [ -f scripts/mone_github_auto_update.py ]; then
            python scripts/mone_github_auto_update.py
          else
            echo "scripts/mone_github_auto_update.py not found; skip cloud update."
          fi

      - name: Record virtual operation history
        working-directory: mone-web-app/backend
        env:
          PYTHONPATH: .
        run: |
          if [ -f record_operation_history.py ]; then
            python record_operation_history.py --market all --modes all --source github-actions --backfill-existing
          else
            echo "record_operation_history.py not found; skip history record."
          fi

      - name: Generate MONE v3.6.1 operational reports
        working-directory: mone-web-app/backend
        env:
          PYTHONPATH: .
        run: |
          set +e
          export PYTHONPATH="$PWD:${PYTHONPATH:-}"
          python operational_check.py
          status=$?
          set -e
          if [ "$status" -ne 0 ]; then
            echo "warning: operational_check.py returned $status; keep workflow running so generated data can still be committed."
          fi

      - name: Remove local token/cache files before commit
        run: |
          find . -type f \( -iname '*token_cache*.json' -o -iname '.env' -o -iname '.env.*' \) -print -delete || true

      - name: Show generated report status
        run: |
          echo "=== operational readiness ==="
          test -f reports/mone_v36_operational_readiness.json && cat reports/mone_v36_operational_readiness.json || true
          echo "=== reports ==="
          ls -lah reports | tail -80 || true
          echo "=== history ==="
          ls -lah data/history || true

      - name: Commit generated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Add only the files the app must read from GitHub raw.
          # Do NOT add whole reports/ or whole data/ because that brings old logs, backtests, alerts, and temporary files.
          git add predictions.csv runner_status_kr.json runner_status_us.json 2>/dev/null || true
          git add paper_trading_log.csv paper_trading_summary.csv 2>/dev/null || true

          # Core candidate / latest run outputs.
          git add reports/swing_candidates_kr*.csv reports/swing_candidates_us*.csv 2>/dev/null || true
          git add reports/latest_kr_* reports/latest_us_* 2>/dev/null || true
          git add reports/stockapp_*.csv reports/stockapp_*.json 2>/dev/null || true

          # MONE v3.6 app-facing reports.
          git add reports/mone_v36_*.csv reports/mone_v36_*.json 2>/dev/null || true
          git add reports/operational_readiness*.json reports/operation_health*.json 2>/dev/null || true
          git add reports/api_data_status_center*.csv reports/api_data_status_center*.json 2>/dev/null || true
          git add reports/gnews_*.csv reports/gnews_*.json reports/news_*.csv reports/news_*.json 2>/dev/null || true
          git add reports/fundamental_*.csv reports/fundamental_*.json 2>/dev/null || true
          git add reports/portfolio_risk_summary.json 2>/dev/null || true

          # Data files used by the app as source/cache.
          git add data/history data/calendar data/stockapp data/market data/news data/disclosures 2>/dev/null || true

          # Keep ignore rules up to date, but never commit secrets/tokens/env files.
          git add .gitignore 2>/dev/null || true
          git reset -- .env .env.local "*.env" "*token_cache*.json" "**/*token_cache*.json" 2>/dev/null || true
          git reset -- data/backtest data/alerts logs backups mone-web-app_backup_before_v3_5 mone-web-app_backup_before_v3_5_2 mone-web-app_backup_before_v3_5_3 mone-web-app_backup_before_v3_6_1_operational 2>/dev/null || true
          git reset -- 'reports/daily_summary_*' 'reports/summary_*' 'reports/order_plan_*_202*.csv' 'reports/test_*.csv' 2>/dev/null || true

          echo "=== staged files ==="
          git diff --cached --name-only

          if git diff --cached --quiet; then
            echo "No app data/report changes to commit."
          else
            git commit -m "chore: update MONE app data reports [skip ci]"
            git pull --rebase --autostash origin "${GITHUB_REF_NAME}"
            git push origin "HEAD:${GITHUB_REF_NAME}"
          fi
