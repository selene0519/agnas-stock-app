name: MONE Auto Accumulator

on:
  workflow_dispatch:
  schedule:
    # GitHub Actions cron uses UTC. KST = UTC+9.
    # KR pre-market: KST 08:17 Mon-Fri = UTC 23:17 Sun-Thu
    - cron: "17 23 * * 0-4"
    # KR close update: KST 16:37 Mon-Fri = UTC 07:37 Mon-Fri
    - cron: "37 7 * * 1-5"
    # US pre-market early: KST 21:50 Mon-Fri = UTC 12:50 Mon-Fri
    - cron: "50 12 * * 1-5"
    # US pre-market confirm: KST 22:50 Mon-Fri = UTC 13:50 Mon-Fri
    - cron: "50 13 * * 1-5"
    # US close update: KST 06:42 Tue-Sat = UTC 21:42 Mon-Fri
    - cron: "42 21 * * 1-5"

permissions:
  contents: write

defaults:
  run:
    shell: bash

concurrency:
  # Prevent overlapping scheduled/manual runs from pushing to main at the same time.
  # false = queue the next run instead of cancelling the current run mid-process.
  group: mone-auto-accumulator-${{ github.ref }}
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      CI: "true"
      GITHUB_ACTIONS_RUN: "true"
      TZ: Asia/Seoul
      PYTHONUTF8: "1"
      STREAMLIT_APP_ENABLE_LIVE_API: "0"
      DART_API_KEY: ${{ secrets.DART_API_KEY }}
      FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
      GNEWS_API_KEY: ${{ secrets.GNEWS_API_KEY }}
      SEC_USER_AGENT: ${{ secrets.SEC_USER_AGENT }}
      KIS_APP_KEY: ${{ secrets.KIS_APP_KEY }}
      KIS_APP_SECRET: ${{ secrets.KIS_APP_SECRET }}
      KIS_ACCOUNT: ${{ secrets.KIS_ACCOUNT }}
      KIS_CANO: ${{ secrets.KIS_CANO }}
      KIS_ACNT_PRDT_CD: ${{ secrets.KIS_ACNT_PRDT_CD }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            python -m pip install -r requirements.txt
          else
            python -m pip install pandas numpy requests python-dotenv yfinance finance-datareader beautifulsoup4 lxml
          fi

      - name: Run MONE cloud update
        run: |
          if [ -f scripts/mone_github_auto_update.py ]; then
            python scripts/mone_github_auto_update.py
          else
            echo "scripts/mone_github_auto_update.py not found; skip cloud update."
          fi

      - name: Record virtual operation history
        working-directory: mone-web-app/backend
        env:
          PYTHONPATH: .
        run: |
          if [ -f record_operation_history.py ]; then
            python record_operation_history.py --market all --modes all --source github-actions --backfill-existing
          else
            echo "record_operation_history.py not found; skip history record."
          fi

      - name: Generate MONE v3.6.1 operational reports
        working-directory: mone-web-app/backend
        env:
          PYTHONPATH: .
        run: |
          set +e

          if [ ! -f operational_check.py ]; then
            echo "operational_check.py not found; skip operational report generation."
            exit 0
          fi

          if [ ! -f app/services/final_engine.py ]; then
            echo "app/services/final_engine.py not found on main; skip operational report generation for now."
            echo "This does not stop data update/commit. Merge the backend app files later to enable this report."
            exit 0
          fi

          python - <<'PY'
import sys
sys.path.insert(0, '.')
try:
    import app.services.final_engine
except Exception as exc:
    print(f"final_engine import failed; skip operational report generation for now: {exc}")
    raise SystemExit(0)
PY

          python operational_check.py
          rc=$?
          if [ "$rc" -ne 0 ]; then
            echo "operational_check.py failed with exit code $rc; skip this optional report and continue workflow."
            exit 0
          fi

      - name: Remove local token/cache files before commit
        run: |
          find . -type f \( -iname '*token_cache*.json' -o -iname '.env' -o -iname '.env.*' \) -print -delete || true

      - name: Show generated report status
        run: |
          echo "=== operational readiness ==="
          test -f reports/mone_v36_operational_readiness.json && cat reports/mone_v36_operational_readiness.json || true
          echo "=== reports ==="
          ls -lah reports | tail -80 || true
          echo "=== history ==="
          ls -lah data/history || true

      - name: Commit generated data
        run: |
          set -euo pipefail

          BRANCH="${GITHUB_REF_NAME:-main}"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          echo "Current branch target: ${BRANCH}"
          echo "=== Changed files before staging ==="
          git status --short || true

          # Stage only generated app/report/data files.
          # Missing folders are ignored so the workflow stays compatible with the current repo structure.
          git add             reports             data/history             data/calendar             mone-web-app/backend/data             mone-web-app/frontend/public/data             mone-web-app/frontend/public/reports             .gitignore             2>/dev/null || true

          # Never commit local secret/cache files.
          git reset --             .env             .env.local             "*.env"             "*token_cache*.json"             "**/*token_cache*.json"             2>/dev/null || true

          if git diff --cached --quiet; then
            echo "No report/history/data changes to commit."
            exit 0
          fi

          echo "=== Staged files ==="
          git diff --cached --name-only

          git commit -m "chore: update MONE operational data [skip ci]"

          # Push can occasionally fail on GitHub refs updates or because another run updated main first.
          # Retry after fetch/rebase so the run can recover without manual Re-run.
          for attempt in 1 2 3 4 5; do
            echo "=== Push attempt ${attempt}/5 ==="

            git fetch origin "${BRANCH}"

            if git rebase --autostash "origin/${BRANCH}"; then
              if git push origin "HEAD:${BRANCH}"; then
                echo "Push succeeded."
                exit 0
              fi
            else
              echo "Rebase failed on attempt ${attempt}. Aborting rebase and retrying if possible."
              git rebase --abort || true
            fi

            sleep $((attempt * 10))
          done

          echo "Push failed after 5 attempts."
          echo "=== Final git status ==="
          git status --short || true
          exit 1
