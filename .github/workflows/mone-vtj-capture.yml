name: MONE AI Journal Capture

on:
  workflow_dispatch:
    inputs:
      market:
        description: "Capture market"
        required: false
        default: "all"
        type: choice
        options:
          - all
          - kr
          - us
      journalSession:
        description: "AI journal session"
        required: false
        default: "AFTER_CLOSE_TRADE"
        type: choice
        options:
          - PREMARKET_PLAN
          - AFTER_CLOSE_TRADE
  schedule:
    # UTC based. Duplicate runs are blocked server-side by market/date/session runKey.
    - cron: "20 23 * * 0-4"   # KST 08:20 Mon-Fri, KR premarket plan
    - cron: "50 7 * * 1-5"    # KST 16:50, KR close capture
    - cron: "30 8 * * 1-5"    # KST 17:30, KR retry after reports settle
    - cron: "30 12 * * 1-5"   # KST 21:30, US premarket plan
    - cron: "20 22 * * 1-5"   # KST 07:20 Tue-Sat, US close capture
    - cron: "0 23 * * 1-5"    # KST 08:00 Tue-Sat, US retry after reports settle

defaults:
  run:
    shell: bash

concurrency:
  group: mone-ai-journal-capture-${{ github.ref }}
  cancel-in-progress: false

jobs:
  capture:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      TZ: Asia/Seoul
      MONE_BACKEND_URL: ${{ secrets.MONE_BACKEND_URL || 'https://agnas-stock-app.onrender.com' }}
      MONE_ADMIN_SECRET: ${{ secrets.MONE_ADMIN_SECRET }}
      DISPATCH_MARKET: ${{ github.event.inputs.market || 'all' }}
      DISPATCH_SESSION: ${{ github.event.inputs.journalSession || 'AFTER_CLOSE_TRADE' }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
    steps:
      - name: Capture AI journal session
        run: |
          BASE="${MONE_BACKEND_URL%/}"
          MARKET="${DISPATCH_MARKET:-all}"
          JOURNAL_SESSION="${DISPATCH_SESSION:-AFTER_CLOSE_TRADE}"

          if [ "${GITHUB_EVENT_NAME:-}" = "schedule" ]; then
            UTC_HOUR="$(date -u '+%H')"
            UTC_MINUTE="$(date -u '+%M')"
            case "${UTC_HOUR}:${UTC_MINUTE}" in
              23:20) MARKET="kr"; JOURNAL_SESSION="PREMARKET_PLAN" ;;
              07:50|08:30) MARKET="kr"; JOURNAL_SESSION="AFTER_CLOSE_TRADE" ;;
              12:30) MARKET="us"; JOURNAL_SESSION="PREMARKET_PLAN" ;;
              22:20|23:00) MARKET="us"; JOURNAL_SESSION="AFTER_CLOSE_TRADE" ;;
            esac
          fi

          echo "AI journal capture request"
          echo "base=${BASE}"
          echo "market=${MARKET}"
          echo "journal_session=${JOURNAL_SESSION}"
          echo "kst_now=$(date '+%Y-%m-%d %H:%M:%S %Z')"

          EVALUATE_AFTER="true"
          if [ "${JOURNAL_SESSION}" = "PREMARKET_PLAN" ]; then
            EVALUATE_AFTER="false"
          fi

          curl --fail-with-body --show-error --silent --retry 2 --retry-delay 10 \
            -X POST "${BASE}/api/journal/auto-capture/run" \
            -H "Content-Type: application/json" \
            -H "x-admin-secret: ${MONE_ADMIN_SECRET}" \
            -d "{\"market\":\"${MARKET}\",\"journalSession\":\"${JOURNAL_SESSION}\",\"limit\":5,\"evaluateAfter\":${EVALUATE_AFTER},\"force\":false}" \
            --max-time 120 \
            -o /tmp/ai_journal_result.json

          cat /tmp/ai_journal_result.json

      - name: 실패 시 텔레그램 알림
        if: failure()
        run: |
          if [ -z "$TELEGRAM_BOT_TOKEN" ] || [ -z "$TELEGRAM_CHAT_ID" ]; then
            echo "TELEGRAM_BOT_TOKEN/CHAT_ID 미설정 — 알림 스킵"
            exit 0
          fi
          curl -sf -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "{\"chat_id\":\"${TELEGRAM_CHAT_ID}\",\"text\":\"⚠️ MONE AI Journal Capture 실패\nrun: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}\nAI 매매일지 캡처가 기록되지 않았을 수 있습니다.\"}" \
            || echo "텔레그램 알림 전송 실패 (무시)"
