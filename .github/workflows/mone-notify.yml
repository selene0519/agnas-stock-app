name: MONE Entry Proximity Notifier

on:
  workflow_dispatch:
  schedule:
    # 국장/미장 개장 전 1회만 (장중 반복 알림 폐지). 시각 매칭은
    # scripts/notify_entry_proximity.py의 _is_kr_preopen()/_is_us_preopen()이 최종 판단한다.
    - cron: "30 23 * * 0-4"  # KST 08:30 (국장 개장 전)
    - cron: "0 13 * * 1-5"   # 미장 개장 전 09:00 ET (EDT 기준)
    - cron: "0 14 * * 1-5"   # 미장 개장 전 09:00 ET (EST 기준)

permissions:
  contents: write

defaults:
  run:
    shell: bash

concurrency:
  group: mone-notify-${{ github.ref }}
  cancel-in-progress: true

jobs:
  notify:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      TZ: Asia/Seoul
      PYTHONUTF8: "1"
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      ENTRY_PROXIMITY_PCT: "2.0"
      KIS_APP_KEY: ${{ secrets.KIS_APP_KEY }}
      KIS_APPKEY: ${{ secrets.KIS_APPKEY }}
      KIS_APP_SECRET: ${{ secrets.KIS_APP_SECRET }}
      KIS_APP_SECRET_KEY: ${{ secrets.KIS_APP_SECRET_KEY }}
      KIS_SECRET: ${{ secrets.KIS_SECRET }}
      KIS_ACCOUNT: ${{ secrets.KIS_ACCOUNT }}
      KIS_ACCOUNT_NO: ${{ secrets.KIS_ACCOUNT_NO }}
      KIS_CANO: ${{ secrets.KIS_CANO }}
      KIS_ACNT_PRDT_CD: ${{ secrets.KIS_ACNT_PRDT_CD }}
      KIS_IS_MOCK: ${{ secrets.KIS_IS_MOCK }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          token: ${{ secrets.GH_PAT }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            python -m pip install -r requirements.txt
          else
            python -m pip install pandas numpy requests python-dotenv
          fi

      - name: Check which market's preopen window this run matches
        id: market_check
        run: |
          KR_HOUR=$(TZ=Asia/Seoul date +%H)
          if [ "$KR_HOUR" = "08" ]; then
            echo "kr_preopen=true" >> $GITHUB_OUTPUT
            echo "국장 개장 전 실행입니다 (KST $(TZ=Asia/Seoul date +%H:%M))"
          else
            echo "kr_preopen=false" >> $GITHUB_OUTPUT
            echo "국장 개장 전 시간이 아닙니다 (KST $(TZ=Asia/Seoul date +%H:%M)) — KIS 현재가 갱신 생략"
          fi

      - name: Refresh KIS live quotes
        if: steps.market_check.outputs.kr_preopen == 'true'
        working-directory: mone-web-app/backend
        env:
          PYTHONPATH: .
          STREAMLIT_APP_ENABLE_LIVE_API: "1"
          MONE_ENABLE_LIVE_QUOTES: "1"
        run: |
          set +e
          python - <<'PY'
          import os, re
          from pathlib import Path

          def adopt_env(primary, *aliases):
              if os.environ.get(primary): return
              for a in aliases:
                  v = os.environ.get(a)
                  if v:
                      os.environ[primary] = v; return

          adopt_env("KIS_APP_KEY", "KIS_APPKEY")
          adopt_env("KIS_APP_SECRET", "KIS_APP_SECRET_KEY", "KIS_SECRET")
          adopt_env("KIS_ACCOUNT", "KIS_ACCOUNT_NO")
          account = re.sub(r"\D", "", os.environ.get("KIS_ACCOUNT", ""))
          if account and not os.environ.get("KIS_CANO") and len(account) >= 8:
              os.environ["KIS_CANO"] = account[:8]
          if account and not os.environ.get("KIS_ACNT_PRDT_CD") and len(account) >= 10:
              os.environ["KIS_ACNT_PRDT_CD"] = account[8:10]

          from app.services import quotes
          repo = Path.cwd().parents[1]
          targets = []

          # 추천 종목에서 심볼 수집
          import csv
          for mode in ("conservative", "balanced", "aggressive"):
              for horizon in ("short", "swing", "mid"):
                  p = repo / "reports" / f"mone_v36_final_recommendations_kr_{mode}_{horizon}.csv"
                  if not p.exists(): continue
                  for enc in ("utf-8-sig", "utf-8", "cp949"):
                      try:
                          with p.open("r", encoding=enc) as f:
                              for row in csv.DictReader(f):
                                  s = str(row.get("symbol") or "").strip()
                                  if s and s not in targets:
                                      targets.append(s)
                          break
                      except: continue

          # 보유종목 심볼 추가
          hpath = repo / "holdings_kr.csv"
          if hpath.exists():
              for enc in ("utf-8-sig", "utf-8", "cp949"):
                  try:
                      with hpath.open("r", encoding=enc) as f:
                          for row in csv.DictReader(f):
                              s = str(row.get("symbol") or "").strip()
                              if s and s not in targets:
                                  targets.append(s)
                      break
                  except: continue

          print(f"현재가 수집 대상: {len(targets)}종목")
          results = quotes.fetch_quotes_bulk("kr", targets[:80])
          ok = sum(1 for r in results if r.get("ok"))
          print(f"수집 완료: {ok}/{len(results)}")
          PY
          echo "KIS quote refresh: exit $?"

      - name: Send entry proximity notifications
        run: |
          python scripts/notify_entry_proximity.py

      - name: Save alert state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add reports/notification_alert_state.json 2>/dev/null || true
          git diff --cached --quiet || git commit -m "chore: update notification alert state [skip ci]"
          git push || true
