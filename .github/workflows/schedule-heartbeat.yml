name: Schedule Heartbeat

on:
  workflow_dispatch:
  schedule:
    - cron: "*/10 * * * *"

permissions:
  contents: write

jobs:
  heartbeat:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Write heartbeat
        run: |
          mkdir -p reports
          echo "{\"event\":\"${{ github.event_name }}\",\"utc\":\"$(date -u +"%Y-%m-%dT%H:%M:%SZ")\"}" > reports/schedule_heartbeat.json
          date -u +"%Y-%m-%dT%H:%M:%SZ" > reports/schedule_heartbeat_utc.txt

      - name: Commit heartbeat
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add reports/schedule_heartbeat.json reports/schedule_heartbeat_utc.txt
          git commit -m "chore: schedule heartbeat [skip ci]" || echo "No changes"
          git push
